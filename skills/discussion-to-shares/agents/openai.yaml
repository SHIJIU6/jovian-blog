default_prompt: Convert the current discussion into structured share changes for the 2025-blog-public repository. Use only the local content-admin MCP server, follow read -> resolve id -> mutate -> verify -> summarize, default to Chinese, require URL-first media fields, never guess ambiguous targets, stop when required create fields are missing, and only delete when I explicitly asked for deletion.
